services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: keystone-postgres
    environment:
      POSTGRES_DB: keystone
      POSTGRES_USER: keystone
      POSTGRES_PASSWORD: keystone
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keystone -d keystone"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  ministack:
    image: ministackorg/ministack:latest
    container_name: keystone-ministack
    environment:
      GATEWAY_PORT: 4566
      LOG_LEVEL: INFO
      MINISTACK_REGION: us-east-1
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4566/_ministack/health')"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    volumes:
      - ministack-data:/tmp/ministack-data/s3

  elasticmq:
    image: softwaremill/elasticmq-native:1.6.12
    container_name: keystone-elasticmq
    ports:
      - "9324:9324"
    volumes:
      - ./elasticmq.conf:/opt/elasticmq.conf:ro
    command: ["-Dconfig.file=/opt/elasticmq.conf"]

volumes:
  postgres-data:
  ministack-data: